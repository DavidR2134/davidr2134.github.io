<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Schedule Appointment</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #container {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 32px 40px;
      text-align: center;
      max-width: 420px;
      width: 100%;
    }

    #icon {
      font-size: 40px;
      margin-bottom: 16px;
    }

    #heading {
      font-size: 17px;
      font-weight: 600;
      color: #222;
      margin-bottom: 8px;
    }

    #subtext {
      font-size: 13px;
      color: #888;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    #fallback-link {
      display: inline-block;
      font-size: 14px;
      color: #0069ff;
      text-decoration: none;
      border: 1px solid #0069ff;
      border-radius: 6px;
      padding: 8px 20px;
      transition: background 0.15s;
    }

    #fallback-link:hover {
      background: #f0f5ff;
    }

    #error {
      font-size: 14px;
      color: #c0392b;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div id="container">
    <!-- Success state (hidden until loaded) -->
    <div id="success-state" style="display:none;">
      <div id="icon">📅</div>
      <div id="heading">Scheduling form opened in a new tab</div>
      <div id="subtext">Complete your appointment booking in the tab that just opened.<br>If it was accidentally closed, use the link below.</div>
      <a id="fallback-link" href="#" target="_blank">Open Scheduling Link</a>
    </div>

    <!-- Error state (hidden until needed) -->
    <div id="error-state" style="display:none;">
      <div id="icon">⚠️</div>
      <div id="error"></div>
    </div>

    <!-- Loading state -->
    <div id="loading-state">
      <div style="font-size:13px; color:#888;">Loading...</div>
    </div>
  </div>

  <script>
    (async function () {
      const loadingEl = document.getElementById('loading-state');
      const successEl = document.getElementById('success-state');
      const errorEl   = document.getElementById('error-state');
      const errorMsg  = document.getElementById('error');
      const fallback  = document.getElementById('fallback-link');

      function showError(msg) {
        loadingEl.style.display = 'none';
        errorEl.style.display = 'block';
        errorMsg.textContent = msg;
      }

      // ── 1. Read campus param from URL ────────────────────────────────────
      const params = new URLSearchParams(window.location.search);
      const campusParam = (params.get('campus') || '').trim();

      if (!campusParam) {
        showError('No campus specified.');
        return;
      }

      // ── 2. Fetch and parse reps.csv ──────────────────────────────────────
      let csvText;
      try {
        const response = await fetch('reps.csv');
        if (!response.ok) throw new Error('Could not load reps.csv');
        csvText = await response.text();
      } catch (err) {
        showError('Error loading scheduling data. Please try again later.');
        console.error(err);
        return;
      }

      // ── 3. Parse CSV (handles quoted fields) ─────────────────────────────
      const lines = csvText.trim().split('\n');
      const headers = lines[0].split(',').map(h => h.trim());

      const reps = lines.slice(1).map(line => {
        const cols = [];
        let current = '';
        let inQuotes = false;
        for (let i = 0; i < line.length; i++) {
          const ch = line[i];
          if (ch === '"') {
            inQuotes = !inQuotes;
          } else if (ch === ',' && !inQuotes) {
            cols.push(current.trim());
            current = '';
          } else {
            current += ch;
          }
        }
        cols.push(current.trim());

        const obj = {};
        headers.forEach((h, i) => {
          obj[h] = (cols[i] || '').trim();
        });
        return obj;
      });

      // ── 4. Match on CampusParam (case-insensitive) ───────────────────────
      const match = reps.find(r =>
        r.CampusParam.toLowerCase() === campusParam.toLowerCase()
      );

      if (!match) {
        showError(`No scheduling link found for "${campusParam}".`);
        return;
      }

      if (!match.CalendlyURL) {
        showError(`No Calendly URL configured for ${match.CampusName}.`);
        return;
      }

      // ── 5. Open Calendly in new tab and show fallback ────────────────────
      window.open(match.CalendlyURL, '_blank');

      fallback.href = match.CalendlyURL;
      loadingEl.style.display = 'none';
      successEl.style.display = 'block';

    })();
  </script>

</body>
</html>
