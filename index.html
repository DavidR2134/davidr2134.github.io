<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Schedule Appointment</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #status {
      padding: 10px 16px;
      font-size: 13px;
      color: #666;
      text-align: center;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
    }

    #status.error {
      color: #c0392b;
      font-weight: 600;
    }

    #calendly-frame {
      flex: 1;
      width: 100%;
      border: none;
      display: none;
    }
  </style>
</head>
<body>

  <div id="status">Loading...</div>
  <iframe id="calendly-frame" allowfullscreen></iframe>

  <script>
    (async function () {
      const statusEl = document.getElementById('status');
      const frame = document.getElementById('calendly-frame');

      // ── 1. Read campus param from URL ────────────────────────────────────
      const params = new URLSearchParams(window.location.search);
      const campusParam = (params.get('campus') || '').trim();

      if (!campusParam) {
        statusEl.textContent = 'No campus specified.';
        statusEl.classList.add('error');
        return;
      }

      // ── 2. Fetch and parse reps.csv ──────────────────────────────────────
      let csvText;
      try {
        const response = await fetch('reps.csv');
        if (!response.ok) throw new Error('Could not load reps.csv');
        csvText = await response.text();
      } catch (err) {
        statusEl.textContent = 'Error loading scheduling data. Please try again later.';
        statusEl.classList.add('error');
        console.error(err);
        return;
      }

      // ── 3. Parse CSV (handles quoted fields) ─────────────────────────────
      const lines = csvText.trim().split('\n');
      const headers = lines[0].split(',').map(h => h.trim());

      const reps = lines.slice(1).map(line => {
        const cols = [];
        let current = '';
        let inQuotes = false;
        for (let i = 0; i < line.length; i++) {
          const ch = line[i];
          if (ch === '"') {
            inQuotes = !inQuotes;
          } else if (ch === ',' && !inQuotes) {
            cols.push(current.trim());
            current = '';
          } else {
            current += ch;
          }
        }
        cols.push(current.trim());

        const obj = {};
        headers.forEach((h, i) => {
          obj[h] = (cols[i] || '').trim();
        });
        return obj;
      });

      // ── 4. Match on CampusParam (case-insensitive) ───────────────────────
      const match = reps.find(r =>
        r.CampusParam.toLowerCase() === campusParam.toLowerCase()
      );

      if (!match) {
        statusEl.textContent = `No scheduling link found for "${campusParam}".`;
        statusEl.classList.add('error');
        return;
      }

      if (!match.CalendlyURL) {
        statusEl.textContent = `No Calendly URL configured for ${match.CampusName}.`;
        statusEl.classList.add('error');
        return;
      }

      // ── 5. Inject Calendly URL into iframe ───────────────────────────────
      statusEl.textContent = `Scheduling with ${match.RepName} — ${match.CampusName}`;
      frame.src = match.CalendlyURL;
      frame.style.display = 'block';

    })();
  </script>

</body>
</html>
